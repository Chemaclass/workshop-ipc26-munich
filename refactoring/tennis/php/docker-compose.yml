services:
  tennis-refactoring:
    build: .
    container_name: ipc26-tennis-php
    command: sh -c "composer install --no-interaction && tail -f /dev/null"
    volumes:
      - .:/srv/workshop-ipc26-munich/refactoring/tennis/php:delegated
    environment:
      XDEBUG_MODE: debug
      XDEBUG_SESSION: PHPSTORM
