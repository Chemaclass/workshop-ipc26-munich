services:
  rock-paper-scissors-tdd:
    build: .
    container_name: ipc26-rps-php
    command: sh -c "composer install --no-interaction && tail -f /dev/null"
    working_dir: /srv/workshop-ipc26-munich/tdd/rock-paper-scissors/php
    volumes:
      - .:/srv/workshop-ipc26-munich/tdd/rock-paper-scissors/php:delegated
    environment:
      XDEBUG_MODE: debug
      XDEBUG_SESSION: PHPSTORM
