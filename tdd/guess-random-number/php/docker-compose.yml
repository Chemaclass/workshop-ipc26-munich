services:
  guess-number-tdd:
    build: .
    container_name: ipc26-guess-number-php
    command: sh -c "composer install --no-interaction && tail -f /dev/null"
    working_dir: /srv/workshop-ipc26-munich/tdd/guess-random-number/php
    volumes:
      - .:/srv/workshop-ipc26-munich/tdd/guess-random-number/php:delegated
    environment:
      XDEBUG_MODE: debug
      XDEBUG_SESSION: PHPSTORM
